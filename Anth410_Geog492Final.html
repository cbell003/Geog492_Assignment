<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title>Paisley Caves Final</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <link rel="icon" type="image/x-icon"
        href="https://raw.githubusercontent.com/mapbox/assembly/publisher-staging/src/svgs/mapbox.svg">
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css' rel='stylesheet' />
    <link href="https://fonts.google.com/" rel="stylesheet">
    <script src="https://unpkg.com/scrollama"></script>
    <style>
        /* body styling and font */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto Mono', monospace;
        }
        /* link styling*/
        a,
        a:hover,
        a:visited {
            color: #0071bc;
        }
        /* main map container styling*/
        #map {
            top: 0;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }
        /* header container styling*/
        #header {
            margin: auto;
            width: 100%;
            position: relative;
            z-index: 5;
        }
        /* text in header styling*/
        #header h1,
        #header h2,
        #header p {
            margin: 0;
            padding: 2vh 2vw;
            text-align: center;
        }
        /* footer container styling*/
        #footer {
            width: 100%;
            min-height: 5vh;
            padding-top: 2vh;
            padding-bottom: 2vh;
            text-align: center;
            line-height: 25px;
            font-size: 13px;
            position: relative;
            z-index: 5;
        }
        /* container that holds all scrollable story sections */
        #features {
            padding-top: 10vh;
            padding-bottom: 10vh;
        }
        /* allows for visually hidden elements*/
        .hidden {
            visibility: hidden;
        }
        /* Centers chapter blocks */
        .centered {
            width: 50vw;
            margin: 0 auto;
        }
        /* left aligned chapter styling*/
        .lefty {
            width: 33vw;
            margin-left: 5vw;
        }
        /* right aligned chapter styling */
        .righty {
            width: 33vw;
            margin-left: 62vw;
        }
        /* full width content block styling */
        .fully {
            width: 100%;
            margin: auto;
        }
        /*light theme styling */
        .light {
            color: #444;
            background-color: #fafafa;
        }
        /* dark theme styling */
        .dark {
            color: #eff1f1;
            background-color: #817272;
        }
        /* scoll step size for each chapter block */
        .step {
            padding-bottom: 50vh;
            /* margin-bottom: 10vh; */
            opacity: 0.25;
        }
        /* styling of active steps  */
        .step.active {
            opacity: 0.9;
        }
        /* text container inside each step */
        .step div {
            padding: 25px 50px;
            line-height: 25px;
            font-size: 13px;
        }
        /* images styling within each step. scales images to fit container width */
        .step img {
            width: 100%;
        }
        /* adjusts layout for smaller screens*/
        @media (max-width: 750px) {

            .centered,
            .lefty,
            .righty,
            .fully {
                width: 90vw;
                margin: 0 auto;
            }
        }

    </style>
</head>

<body>

    <div id="map"></div>
    <div id="story"></div>

    <script src="./config.js"></script> <!-- contains all chapter data and map setting-->
    <script>
        var initLoad = true; // initial map load

        // map alignment options
        var alignments = {
            'left': 'lefty',
            'center': 'centered',
            'right': 'righty',
            'full': 'fully'
        }

        var story = document.getElementById('story'); //gets the main story container 
        var features = document.createElement('div'); // creates a new div that will hold all chapter sections
        features.setAttribute('id', 'features');

        var header = document.createElement('div'); // creates a header container

        // adds the title from config
        if (config.title) {
            var titleText = document.createElement('h1');
            titleText.innerText = config.title;
            header.appendChild(titleText);
        }

        // adds subtitiles from config
        if (config.subtitle) {
            var subtitleText = document.createElement('h2');
            subtitleText.innerText = config.subtitle;
            header.appendChild(subtitleText);
        }

        // adds a byline if it exists from config
        if (config.byline) {
            var bylineText = document.createElement('p');
            bylineText.innerText = config.byline;
            header.appendChild(bylineText);
        }

        // adds a header if it is in the Config
        if (header.innerText.length > 0) {
            header.classList.add(config.theme);
            header.setAttribute('id', 'header');
            story.appendChild(header);
        }

        // loop through each chapter difined in config
        config.chapters.forEach((record, idx) => {
            var container = document.createElement('div'); //creates container for the chapter
            var chapter = document.createElement('div'); // creates chapter blocks

            // if a chapter has a title, create and add it. 
            if (record.title) {
                var title = document.createElement('h3');
                title.innerText = record.title;
                chapter.appendChild(title);
            }

            // if a chapter has an image, it gets added.
            if (record.image) {
                 var image = new Image();
                 image.src = record.image;
                // if the image size is classified as small, sets its size to 250px
                if (record.imageSize === "small") {
                image.style.width = "250px";
                }
                // Apply alt text if defined in the chapter
              if (record.alt) {
                 image.alt = record.alt;
                } 
         chapter.appendChild(image);
            }

            // if the chapter has a description, it gets added
            if (record.description) {
                var story = document.createElement('p');
                story.innerHTML = record.description;
                chapter.appendChild(story);
            }

            // sets container attributes and classes based on config and chapter settings
            container.setAttribute('id', record.id);
            container.classList.add('step');
            if (idx === 0) {
                container.classList.add('active');
            }

            // set container attributes and classes
            chapter.classList.add(config.theme);
            container.appendChild(chapter);
            container.classList.add(alignments[record.alignment] || 'centered');

            // if the chapter is set to hidden in config, it will be hidden
            if (record.hidden) {
                container.classList.add('hidden');
            }
            features.appendChild(container);
        });


        story.appendChild(features);

        // creates footer container
        var footer = document.createElement('div');

        // adds footer text if it exists in config
        if (config.footer) {
            var footerText = document.createElement('p');
            footerText.innerHTML = config.footer;
            footer.appendChild(footerText);
        }

        // adds footer if there is text in the footer
        if (footer.innerText.length > 0) {
            footer.classList.add(config.theme);
            footer.setAttribute('id', 'footer');
            story.appendChild(footer);
        }

        mapboxgl.accessToken = config.accessToken;

        // Initializes the main mapbox map
        var map = new mapboxgl.Map({
            container: 'map',
            style: config.style,
            center: config.chapters[0].location.center,
            zoom: config.chapters[0].location.zoom,
            bearing: config.chapters[0].location.bearing,
            pitch: config.chapters[0].location.pitch,
            interactive: false,
            projection: config.projection
        });
        
        // adds marker if enabled in config
        if (config.showMarkers) {
            var marker = new mapboxgl.Marker({ color: config.markerColor });
            marker.setLngLat(config.chapters[0].location.center).addTo(map);
        }

        // instantiate the scrollama
        var scroller = scrollama();

        
        map.on("load", function () {
            if (config.use3dTerrain) {
                map.addSource('mapbox-dem', {
                    'type': 'raster-dem',
                    'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                    'tileSize': 512,
                    'maxzoom': 14
                });
                // add the DEM source as a terrain layer with exaggerated height
                map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });

                // add a sky layer that will show when the map is highly pitched
                map.addLayer({
                    'id': 'sky',
                    'type': 'sky',
                    'paint': {
                        'sky-type': 'atmosphere',
                        'sky-atmosphere-sun': [0.0, 0.0],
                        'sky-atmosphere-sun-intensity': 15
                    }
                });
            };

            // setup the instance, pass callback functions
            scroller
                .setup({
                    step: '.step',
                    offset: 0.5,
                    progress: true
                })
                // when a new step is entered do this
                .onStepEnter(async response => {
                    var current_chapter = config.chapters.findIndex(chap => chap.id === response.element.id);
                    var chapter = config.chapters[current_chapter];

                    response.element.classList.add('active');
                    map[chapter.mapAnimation || 'flyTo'](chapter.location);

                    // if markers are enabled in config, move the marker to the chapter location
                    if (config.showMarkers) {
                        marker.setLngLat(chapter.location.center);
                    }
                    // sets thee opacity of any layers defined in the onchapterenter array for the chapter
                    if (chapter.onChapterEnter.length > 0) {
                        chapter.onChapterEnter.forEach(setLayerOpacity);
                    }
                    // calls a chapter specific callback function if it is defined in the config
                    if (chapter.callback) {
                        window[chapter.callback]();
                    }
                    // rotates the map 180 degrees if rotateAnimation is set to true for the chapter in config
                    if (chapter.rotateAnimation) {
                        map.once('moveend', () => {
                            const rotateNumber = map.getBearing();
                            map.rotateTo(rotateNumber + 180, {
                                duration: 30000, easing: function (t) {
                                    return t;
                                }
                            });
                        });
                    }
                    // if auto is set to true in config, scroll to the next chapter when the map movement ends
                    if (config.auto) {
                        var next_chapter = (current_chapter + 1) % config.chapters.length;
                        map.once('moveend', () => {
                            document.querySelectorAll('[data-scrollama-index="' + next_chapter.toString() + '"]')[0].scrollIntoView();
                        });
                    }
                })
                // sets the opacity of a layer. used for onChapterEnter and onChapterExit actions in config
                .onStepExit(response => {
                    var chapter = config.chapters.find(chap => chap.id === response.element.id);
                    response.element.classList.remove('active');
                    if (chapter.onChapterExit.length > 0) {
                        chapter.onChapterExit.forEach(setLayerOpacity);
                    }
                });

            // auto start at chapter 0 if auto is set to true in config
            if (config.auto) {
                document.querySelectorAll('[data-scrollama-index="0"]')[0].scrollIntoView();
            }
        });    

    </script>

</body>

</html>
